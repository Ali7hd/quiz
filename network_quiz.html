<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار شبكات الحاسوب</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #20243a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d3148;
    --radius: 14px;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── WELCOME SCREEN ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
    background: radial-gradient(ellipse at 60% 20%, #2d1b69 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, #1a3a5c 0%, transparent 55%),
                var(--bg);
  }

  .logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin-bottom: 28px;
    box-shadow: 0 0 40px #6c63ff55;
  }

  #welcome h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  #welcome p {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 48px;
    max-width: 400px;
  }

  .mode-cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 32px 40px;
    cursor: pointer;
    transition: all 0.25s;
    min-width: 200px;
    text-align: center;
  }

  .mode-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 8px 32px #6c63ff33;
  }

  .mode-card .icon { font-size: 44px; margin-bottom: 14px; }
  .mode-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .mode-card p { font-size: 13px; color: var(--muted); }

  /* ── QUIZ SCREEN ── */
  #quiz { display: none; min-height: 100vh; padding: 16px; }

  .quiz-header {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .quiz-title { font-weight: 700; font-size: 17px; }
  .quiz-mode-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  .score-bar {
    display: flex; gap: 16px;
    font-size: 14px; color: var(--muted);
  }
  .score-bar span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }

  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .q-meta {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap; gap: 8px;
  }

  .q-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }

  .toggle-ans-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .toggle-ans-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .q-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  /* ── MCQ OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: right;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #2d2f4a;
  }

  .opt-btn.correct { background: #14532d55; border-color: var(--green) !important; color: var(--green); }
  .opt-btn.wrong   { background: #7f1d1d55; border-color: var(--red)   !important; color: var(--red); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    background: var(--border);
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .opt-btn.correct .opt-letter { background: var(--green); color: #fff; }
  .opt-btn.wrong   .opt-letter { background: var(--red);   color: #fff; }

  /* ── TRUE/FALSE ── */
  .tf-btns {
    display: flex; gap: 12px;
    margin-top: 4px;
  }

  .tf-btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card2);
    color: var(--text);
  }

  .tf-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #2d2f4a;
  }

  .tf-btn.true-btn { }
  .tf-btn.false-btn { }
  .tf-btn.correct { background: #14532d55; border-color: var(--green); color: var(--green); }
  .tf-btn.wrong   { background: #7f1d1d55; border-color: var(--red);   color: var(--red);   }
  .tf-btn:disabled { cursor: default; }

  /* ── ANSWER REVEAL ── */
  .answer-reveal {
    display: none;
    margin-top: 14px;
    background: #1e2d3a;
    border: 1px solid #2d4a5a;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--accent2);
  }

  .answer-reveal.visible { display: block; }
  .answer-reveal strong { color: #fff; }

  /* ── RESULT BADGE ── */
  .result-badge {
    display: none;
    margin-top: 12px;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 8px;
    text-align: center;
  }
  .result-badge.show-correct { display: block; background: #14532d55; color: var(--green); border: 1px solid var(--green); }
  .result-badge.show-wrong   { display: block; background: #7f1d1d55; color: var(--red);   border: 1px solid var(--red);   }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 20px; }
  .progress-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .progress-track {
    background: var(--card);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s;
  }

  /* ── FINAL SCREEN ── */
  #final {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 32px;
    background: radial-gradient(ellipse at 50% 30%, #2d1b69 0%, transparent 60%), var(--bg);
  }

  .final-emoji { font-size: 72px; margin-bottom: 16px; }
  .final-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .final-score {
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 16px 0;
  }
  .final-msg { color: var(--muted); font-size: 16px; margin-bottom: 32px; }

  .final-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }

  .btn-sec {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sec:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- ══════════════ WELCOME ══════════════ -->
<div id="welcome">
  <div class="logo">🌐</div>
  <h1>اختبار شبكات الحاسوب</h1>
  <p>اختر نوع الأسئلة التي تريد الاختبار بها</p>
  <div class="mode-cards">
    <div class="mode-card" onclick="startQuiz('mcq')">
      <div class="icon">📋</div>
      <h2>اختيار من متعدد</h2>
      <p>55 سؤال — اختر الإجابة الصحيحة من 4 خيارات</p>
    </div>
    <div class="mode-card" onclick="startQuiz('tf')">
      <div class="icon">✅</div>
      <h2>صح وغلط</h2>
      <p>60 عبارة — حدد إذا كانت صحيحة أم خاطئة</p>
    </div>
  </div>
</div>

<!-- ══════════════ QUIZ ══════════════ -->
<div id="quiz">
  <div class="quiz-header">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button class="back-btn" onclick="goHome()">← الرئيسية</button>
      <span class="quiz-title">شبكات الحاسوب</span>
      <span class="quiz-mode-badge" id="mode-badge"></span>
    </div>
    <div class="score-bar">
      <span><span class="dot green"></span><span id="correct-count">0</span> صحيح</span>
      <span><span class="dot red"></span><span id="wrong-count">0</span> خطأ</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label" id="progress-label"></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="questions-container"></div>
</div>

<!-- ══════════════ FINAL ══════════════ -->
<div id="final" style="display:none;flex-direction:column;">
  <div class="final-emoji" id="final-emoji">🎉</div>
  <div class="final-title">انتهى الاختبار!</div>
  <div class="final-score" id="final-score"></div>
  <div class="final-msg" id="final-msg"></div>
  <div class="final-btns">
    <button class="btn-primary" onclick="goHome()">🏠 الرئيسية</button>
    <button class="btn-sec" onclick="restartQuiz()">🔄 إعادة الاختبار</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

const mcqData = [
  { q: "Which of the following is not a component of network architecture?", opts: ["Network topology","Network components","Network protocols","Operating system"], ans: 3 },
  { q: "Which of the following network topologies connects each device directly to every other device?", opts: ["Star topology","Ring topology","Mesh topology","Bus topology"], ans: 2 },
  { q: "In a star topology, all devices are connected to a:", opts: ["Router","Central hub","Switch","Server"], ans: 1 },
  { q: "Which of the following is a disadvantage of a bus topology?", opts: ["High cost","Limited scalability","Robustness","Fast data transmission"], ans: 1 },
  { q: "Which network device amplifies and reshapes a signal to extend the distance of data transmission?", opts: ["Router","Repeater","Switch","Gateway"], ans: 1 },
  { q: "Which protocol is used for sending data packets over the Internet in a connectionless manner?", opts: ["Transmission Control Protocol (TCP)","Internet Protocol (IP)","File Transfer Protocol (FTP)","Hypertext Transfer Protocol (HTTP)"], ans: 1 },
  { q: "In the OSI model, which layer is responsible for the end-to-end communication between two devices?", opts: ["Network layer","Transport layer","Data link layer","Physical layer"], ans: 1 },
  { q: "Which of the following is an example of a point-to-point network?", opts: ["Broadcast network","LAN","WAN","Internet"], ans: 2 },
  { q: "Which protocol operates at the application layer and is used for email transmission?", opts: ["HTTP","SMTP","DNS","FTP"], ans: 1 },
  { q: "In the TCP/IP model, which layer corresponds to the network layer of the OSI model?", opts: ["Internet layer","Transport layer","Application layer","Data link layer"], ans: 0 },
  { q: "What does encapsulation in the network communication process refer to?", opts: ["Breaking down a message into smaller packets","Adding protocol information at each layer of the protocol stack","Securing data with encryption","Compressing the data"], ans: 1 },
  { q: "Which of the following is an advantage of a ring topology?", opts: ["Simple fault detection","Low cost","High scalability","Redundancy"], ans: 0 },
  { q: "What is the function of a router in a network?", opts: ["Amplifies signals","Connects different networks and forwards data","Provides wireless connectivity","Translates IP addresses"], ans: 1 },
  { q: "Which layer of the OSI model is responsible for establishing, maintaining, and terminating communication sessions?", opts: ["Application layer","Presentation layer","Session layer","Transport layer"], ans: 2 },
  { q: "Which network topology uses a central device for managing all communication?", opts: ["Mesh","Ring","Bus","Star"], ans: 3 },
  { q: "Which network type is typically used within a single building or campus?", opts: ["Local Area Network (LAN)","Metropolitan Area Network (MAN)","Wide Area Network (WAN)","Personal Area Network (PAN)"], ans: 0 },
  { q: "In which network topology does a single point of failure affect the entire network?", opts: ["Mesh","Ring","Bus","Star"], ans: 2 },
  { q: "What is the primary function of a network gateway?", opts: ["Connects multiple devices within a LAN","Connects different networks and translates between different protocols","Amplifies and reshapes signals","Routes data packets within a network"], ans: 1 },
  { q: "Which network protocol is connection-oriented and ensures reliable data transmission?", opts: ["User Datagram Protocol (UDP)","Internet Protocol (IP)","Transmission Control Protocol (TCP)","Hypertext Transfer Protocol (HTTP)"], ans: 2 },
  { q: "Which of the following describes a broadcast network?", opts: ["Every device is connected to every other device directly","Data is sent from one device to another via multiple routes","A message is sent to all devices connected to the network","Devices compete for a shared communication medium"], ans: 2 },
  { q: "Which layer of the OSI model is responsible for converting data into a form that can be transmitted over the network?", opts: ["Physical layer","Data link layer","Presentation layer","Application layer"], ans: 2 },
  { q: "Which of the following is not a characteristic of a mesh topology?", opts: ["High redundancy","Low cost for wired networks","Direct communication between devices","Popular in wireless networks"], ans: 1 },
  { q: "What is the purpose of the Transport layer in the TCP/IP model?", opts: ["Routing data between networks","Ensuring end-to-end communication and reliability","Addressing and packet forwarding","Physical data transmission"], ans: 1 },
  { q: "In which network type does each device receive the same signal but only the intended recipient processes it?", opts: ["Point-to-point network","Broadcast network","Ring network","Star network"], ans: 1 },
  { q: "Which protocol is used to resolve IP addresses to MAC addresses in a local network?", opts: ["Address Resolution Protocol (ARP)","Internet Control Message Protocol (ICMP)","Domain Name System (DNS)","Hypertext Transfer Protocol (HTTP)"], ans: 0 },
  { q: "What does the term encapsulation refer to in the context of network communication?", opts: ["Encrypting data for secure transmission","Adding protocol headers to data as it moves through each network layer","Compressing data for faster transmission","Establishing a connection between two devices"], ans: 1 },
  { q: "Which topology is most commonly used in home networks?", opts: ["Mesh","Star","Bus","Ring"], ans: 1 },
  { q: "Which protocol is responsible for translating domain names to IP addresses?", opts: ["File Transfer Protocol (FTP)","Hypertext Transfer Protocol (HTTP)","Domain Name System (DNS)","Simple Mail Transfer Protocol (SMTP)"], ans: 2 },
  { q: "Which type of network uses multiple connections between devices, allowing for multiple routes for data transmission?", opts: ["Star topology","Ring topology","Mesh topology","Bus topology"], ans: 2 },
  { q: "Which protocol operates at the transport layer and is best suited for real-time applications like video streaming?", opts: ["TCP","UDP","HTTP","FTP"], ans: 1 },
  { q: "Which component of an email system allows users to send and retrieve messages?", opts: ["Message Transfer Agent (MTA)","User Agent (UA)","Internet Service Provider (ISP)","File Transfer Protocol (FTP)"], ans: 1 },
  { q: "Which type of network is typically used to connect devices within a city?", opts: ["LAN","WAN","PAN","MAN"], ans: 3 },
  { q: "What is the primary function of the Internet Protocol (IP)?", opts: ["Establishing a reliable connection between two devices","Routing data packets between networks","Securing data through encryption","Delivering multimedia content"], ans: 1 },
  { q: "Which of the following is a feature of a point-to-point network?", opts: ["All devices share the same communication medium","Data is transmitted over multiple routes between devices","Every device is connected to every other device","Only two devices communicate at a time"], ans: 3 },
  { q: "In the TCP/IP model, which layer corresponds to both the data link and physical layers of the OSI model?", opts: ["Application layer","Transport layer","Internet layer","Host-to-network layer"], ans: 3 },
  { q: "Which of the following protocols is connectionless and does not guarantee the delivery of data?", opts: ["Transmission Control Protocol (TCP)","User Datagram Protocol (UDP)","Hypertext Transfer Protocol (HTTP)","Simple Mail Transfer Protocol (SMTP)"], ans: 1 },
  { q: "Which network topology connects all devices to a single backbone cable?", opts: ["Ring topology","Bus topology","Star topology","Mesh topology"], ans: 1 },
  { q: "Which of the following best describes Wide Area Networks (WANs)?", opts: ["They are contained within a building or campus.","They cover a city or metropolitan area.","They cover large geographical areas, such as countries or continents.","They connect devices within personal spaces, such as homes."], ans: 2 },
  { q: "Which of the following protocols operates at the application layer of the OSI model?", opts: ["Internet Protocol (IP)","Simple Mail Transfer Protocol (SMTP)","Transmission Control Protocol (TCP)","Address Resolution Protocol (ARP)"], ans: 1 },
  { q: "Which process describes dividing a message into smaller packets and adding headers as the data moves down the OSI layers?", opts: ["Encryption","Fragmentation","Compression","Encapsulation"], ans: 3 },
  { q: "Which network device operates at the physical layer and is used to regenerate signals to extend network distance?", opts: ["Switch","Router","Repeater","Gateway"], ans: 2 },
  { q: "Which of the following is a feature of priority scheduling in process management?", opts: ["The first process in the queue is served first.","Processes with the shortest time to completion are given priority.","Processes with higher priority are allocated processor time more often.","All processes are assigned equal time slices."], ans: 2 },
  { q: "Which protocol is responsible for routing packets through different networks to their destination?", opts: ["File Transfer Protocol (FTP)","Internet Protocol (IP)","User Datagram Protocol (UDP)","Simple Mail Transfer Protocol (SMTP)"], ans: 1 },
  { q: "Which protocol works at the transport layer of both the OSI and TCP/IP models to ensure reliable communication between hosts?", opts: ["Hypertext Transfer Protocol (HTTP)","Domain Name System (DNS)","Transmission Control Protocol (TCP)","User Datagram Protocol (UDP)"], ans: 2 },
  { q: "Which of the following topologies allows devices to connect using a central device like a router or switch?", opts: ["Mesh topology","Star topology","Bus topology","Ring topology"], ans: 1 },
  { q: "Which network device interconnects different networks and forwards data packets based on their IP addresses?", opts: ["Switch","Repeater","Router","Bridge"], ans: 2 },
  { q: "In the OSI model, which layer is responsible for providing error detection and correction?", opts: ["Physical layer","Data link layer","Transport layer","Application layer"], ans: 1 },
  { q: "Which of the following is not an advantage of using a mesh topology?", opts: ["High redundancy","Increased cost for wired implementation","Reliable data transmission","Centralized management"], ans: 3 },
  { q: "Which protocol is responsible for converting a domain name into an IP address?", opts: ["Hypertext Transfer Protocol (HTTP)","Domain Name System (DNS)","Address Resolution Protocol (ARP)","Transmission Control Protocol (TCP)"], ans: 1 },
  { q: "In a point-to-point network, how is data transmitted?", opts: ["By broadcasting to all devices connected to the network","By routing data through multiple paths","Directly between two devices using a dedicated connection","By using a central device like a router"], ans: 2 },
  { q: "Which protocol is used by web browsers to request and retrieve web pages from a web server?", opts: ["Hypertext Transfer Protocol (HTTP)","Simple Mail Transfer Protocol (SMTP)","Internet Control Message Protocol (ICMP)","Transmission Control Protocol (TCP)"], ans: 0 },
  { q: "What is the role of encapsulation in network communication?", opts: ["Securing data using encryption","Compressing data for faster transmission","Adding protocol-specific information to data at each layer of the protocol stack","Routing data packets through the network"], ans: 2 },
  { q: "Which network topology is characterized by each device being connected to exactly two other devices, forming a loop?", opts: ["Mesh topology","Star topology","Ring topology","Bus topology"], ans: 2 },
  { q: "Which of the following protocols works at the application layer and is used for transferring files between a client and a server?", opts: ["Simple Mail Transfer Protocol (SMTP)","Domain Name System (DNS)","File Transfer Protocol (FTP)","Hypertext Transfer Protocol (HTTP)"], ans: 2 },
  { q: "Which of the following describes the main advantage of using the round-robin scheduling algorithm?", opts: ["It allows processes with the shortest time to complete to run first.","All processes receive equal CPU time slices in a circular order.","Processes with higher priority are served more frequently.","Processes are executed in the order they arrive in the queue."], ans: 1 },
];

const tfData = [
  { q: "In a bus topology, if the main cable fails, the entire network will be affected.", ans: true },
  { q: "Mesh topology is widely used in wired networks due to its cost-effectiveness.", ans: false },
  { q: "The OSI model consists of seven layers.", ans: true },
  { q: "A repeater operates at the network layer of the OSI model.", ans: false },
  { q: "A ring topology connects each node to exactly two other nodes, forming a single loop.", ans: true },
  { q: "A router forwards data packets based on their MAC addresses.", ans: false },
  { q: "UDP provides a connection-oriented communication protocol.", ans: false },
  { q: "In the TCP/IP model, the transport layer ensures reliable data transmission.", ans: true },
  { q: "Star topology has a central point of failure because all devices are connected to a central hub or switch.", ans: true },
  { q: "The main purpose of the Domain Name System (DNS) is to translate domain names into IP addresses.", ans: true },
  { q: "Encapsulation involves adding protocol headers to data as it moves down the layers of the OSI model.", ans: true },
  { q: "File Transfer Protocol (FTP) is used to transfer email messages between mail servers.", ans: false },

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentMode = '';
let correctCount = 0;
let wrongCount = 0;
let answered = 0;
let totalQ = 0;

// ══════════════════════════════════════════════
//  QUIZ START
// ══════════════════════════════════════════════
function startQuiz(mode) {
  currentMode = mode;
  correctCount = 0; wrongCount = 0; answered = 0;
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('wrong-count').textContent = '0';

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('final').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';

  const data = mode === 'mcq' ? mcqData : tfData;
  totalQ = data.length;

  document.getElementById('mode-badge').textContent = mode === 'mcq' ? 'اختيار من متعدد' : 'صح وغلط';
  updateProgress();

  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  data.forEach((item, i) => {
    container.appendChild(mode === 'mcq' ? buildMCQ(item, i) : buildTF(item, i));
  });
}

// ══════════════════════════════════════════════
//  BUILD MCQ CARD
// ══════════════════════════════════════════════
function buildMCQ(item, i) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `qcard-${i}`;

  const letters = ['a','b','c','d'];

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">سؤال ${i + 1}</span>
      <button class="toggle-ans-btn" onclick="toggleAnswer(${i})">👁 إظهار الإجابة</button>
    </div>
    <div class="q-text">${item.q}</div>
    <div class="options" id="opts-${i}">
      ${item.opts.map((opt, j) => `
        <button class="opt-btn" id="opt-${i}-${j}" onclick="chooseMCQ(${i}, ${j}, ${item.ans})">
          <span class="opt-letter">${letters[j]}</span>
          ${opt}
        </button>
      `).join('')}
    </div>
    <div class="result-badge" id="result-${i}"></div>
    <div class="answer-reveal" id="ans-reveal-${i}">
      ✅ <strong>الإجابة الصحيحة:</strong> ${item.opts[item.ans]}
    </div>
  `;
  return card;
}

function chooseMCQ(qi, chosen, correct) {
  if (document.getElementById(`opt-${qi}-0`).disabled) return;

  const allOpts = document.querySelectorAll(`#opts-${qi} .opt-btn`);
  allOpts.forEach((btn, j) => {
    btn.disabled = true;
    if (j === correct) btn.classList.add('correct');
    else if (j === chosen && chosen !== correct) btn.classList.add('wrong');
  });

  const badge = document.getElementById(`result-${qi}`);
  if (chosen === correct) {
    correctCount++;
    badge.className = 'result-badge show-correct';
    badge.textContent = '✅ إجابة صحيحة!';
  } else {
    wrongCount++;
    badge.className = 'result-badge show-wrong';
    badge.textContent = '❌ إجابة خاطئة';
  }

  answered++;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  updateProgress();
  if (answered === totalQ) setTimeout(showFinal, 800);
}

// ══════════════════════════════════════════════
//  BUILD TRUE/FALSE CARD
// ══════════════════════════════════════════════
function buildTF(item, i) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `qcard-${i}`;

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">عبارة ${i + 1}</span>
      <button class="toggle-ans-btn" onclick="toggleAnswer(${i})">👁 إظهار الإجابة</button>
    </div>
    <div class="q-text">${item.q}</div>
    <div class="tf-btns">
      <button class="tf-btn true-btn" id="tf-${i}-true"  onclick="chooseTF(${i}, true,  ${item.ans})">✔ صحيح</button>
      <button class="tf-btn false-btn" id="tf-${i}-false" onclick="chooseTF(${i}, false, ${item.ans})">✘ خطأ</button>
    </div>
    <div class="result-badge" id="result-${i}"></div>
    <div class="answer-reveal" id="ans-reveal-${i}">
      ✅ <strong>الإجابة الصحيحة:</strong> ${item.ans ? 'صحيح ✔' : 'خطأ ✘'}
    </div>
  `;
  return card;
}

function chooseTF(qi, chosen, correct) {
  const tBtn = document.getElementById(`tf-${qi}-true`);
  const fBtn = document.getElementById(`tf-${qi}-false`);
  if (tBtn.disabled) return;

  tBtn.disabled = true; fBtn.disabled = true;

  const isRight = (chosen === correct);

  if (correct === true) tBtn.classList.add('correct');
  else fBtn.classList.add('correct');

  if (!isRight) {
    if (chosen === true) tBtn.classList.add('wrong');
    else fBtn.classList.add('wrong');
  }

  const badge = document.getElementById(`result-${qi}`);
  if (isRight) {
    correctCount++;
    badge.className = 'result-badge show-correct';
    badge.textContent = '✅ إجابة صحيحة!';
  } else {
    wrongCount++;
    badge.className = 'result-badge show-wrong';
    badge.textContent = '❌ إجابة خاطئة';
  }

  answered++;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  updateProgress();
  if (answered === totalQ) setTimeout(showFinal, 800);
}

// ══════════════════════════════════════════════
//  TOGGLE ANSWER
// ══════════════════════════════════════════════
function toggleAnswer(i) {
  const el = document.getElementById(`ans-reveal-${i}`);
  const btn = document.querySelector(`#qcard-${i} .toggle-ans-btn`);
  const visible = el.classList.contains('visible');
  el.classList.toggle('visible', !visible);
  btn.textContent = visible ? '👁 إظهار الإجابة' : '🙈 إخفاء الإجابة';
}

// ══════════════════════════════════════════════
//  PROGRESS
// ══════════════════════════════════════════════
function updateProgress() {
  const pct = totalQ ? Math.round((answered / totalQ) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `تمت الإجابة على ${answered} من ${totalQ} سؤال`;
}

// ══════════════════════════════════════════════
//  FINAL
// ══════════════════════════════════════════════
function showFinal() {
  document.getElementById('quiz').style.display = 'none';
  const final = document.getElementById('final');
  final.style.display = 'flex';

  const pct = Math.round((correctCount / totalQ) * 100);
  document.getElementById('final-score').textContent = `${correctCount} / ${totalQ}`;

  let emoji = '😔', msg = 'حاول مرة أخرى، أنت قادر على التحسن!';
  if (pct >= 90) { emoji = '🏆'; msg = 'ممتاز! أداء رائع جداً!'; }
  else if (pct >= 75) { emoji = '🎉'; msg = 'جيد جداً! استمر في التعلم!'; }
  else if (pct >= 60) { emoji = '👍'; msg = 'جيد! يمكنك تحسين نتيجتك!'; }
  else if (pct >= 40) { emoji = '📚'; msg = 'راجع المحاضرات وحاول مرة أخرى!'; }

  document.getElementById('final-emoji').textContent = emoji;
  document.getElementById('final-msg').textContent = `حصلت على ${pct}% — ${msg}`;
}

// ══════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════
function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('final').style.display = 'none';
  document.getElementById('welcome').style.display = 'flex';
}

function restartQuiz() {
  startQuiz(currentMode);
}
</script>
